apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbr-sandbox
  namespace: vllm-semantic-router-system
  labels:
    app: bbr-sandbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bbr-sandbox
  template:
    metadata:
      labels:
        app: bbr-sandbox
    spec:
      containers:
      - name: bbr-sandbox
        image: image-registry.openshift-image-registry.svc:5000/vllm-semantic-router-system/bbr-sandbox:latest
        args:
        - "--target"
        - "bbr-plugins.vllm-semantic-router-system.svc.cluster.local:9004"
        - "--no-browser"
        - "--port"
        - "8888"
        ports:
        - name: http
          containerPort: 8888
          protocol: TCP
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8888
          initialDelaySeconds: 3
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8888
          initialDelaySeconds: 2
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bbr-sandbox
  namespace: vllm-semantic-router-system
  labels:
    app: bbr-sandbox
spec:
  selector:
    app: bbr-sandbox
  ports:
  - name: http
    port: 8888
    targetPort: 8888
    protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: bbr-sandbox
  namespace: vllm-semantic-router-system
  labels:
    app: bbr-sandbox
spec:
  to:
    kind: Service
    name: bbr-sandbox
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
