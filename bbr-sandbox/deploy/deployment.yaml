apiVersion: apps/v1
kind: Deployment
metadata:
  name: bbr-plugins
  namespace: bbr-plugins
  labels:
    app: bbr-plugins
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bbr-plugins
  template:
    metadata:
      labels:
        app: bbr-plugins
    spec:
      containers:
      - name: bbr-server
        image: image-registry.openshift-image-registry.svc:5000/bbr-plugins/bbr-plugins:latest
        args:
        - "--secure-serving=false"
        - "--grpc-port=9004"
        - "--plugin"
        - "body-field-to-header:model-header:{\"field_name\":\"model\",\"header_name\":\"X-Gateway-Model-Name\"}"
        - "--plugin"
        - "inference-api-translator:translator"
        ports:
        - name: grpc
          containerPort: 9004
          protocol: TCP
        - name: health
          containerPort: 9005
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          grpc:
            port: 9005
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          grpc:
            port: 9005
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bbr-plugins
  namespace: bbr-plugins
  labels:
    app: bbr-plugins
spec:
  selector:
    app: bbr-plugins
  ports:
  - name: grpc
    port: 9004
    targetPort: 9004
    protocol: TCP
  - name: health
    port: 9005
    targetPort: 9005
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP
